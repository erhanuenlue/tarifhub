apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-ingestion
  labels:
    app.kubernetes.io/name: tarifhub
    app.kubernetes.io/component: ingestion
spec:
  replicas: {{ .Values.ingestion.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tarifhub
      app.kubernetes.io/component: ingestion
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tarifhub
        app.kubernetes.io/component: ingestion
    spec:
      containers:
        - name: ingestion
          image: "{{ .Values.ingestion.image.repository }}:{{ .Values.ingestion.image.tag }}"
          imagePullPolicy: {{ .Values.ingestion.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.ingestion.port }}
          env:
            - name: TARIFHUB_DB_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Release.Name }}-postgres:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
            {{- range $key, $value := .Values.ingestion.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.ingestion.resources | nindent 12 }}
