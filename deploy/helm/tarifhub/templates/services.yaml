apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-ingestion
  labels:
    app.kubernetes.io/name: tarifhub
    app.kubernetes.io/component: ingestion
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tarifhub
    app.kubernetes.io/component: ingestion
  ports:
    - name: http
      port: {{ .Values.ingestion.port }}
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-serving
  labels:
    app.kubernetes.io/name: tarifhub
    app.kubernetes.io/component: serving
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tarifhub
    app.kubernetes.io/component: serving
  ports:
    - name: http
      port: {{ .Values.serving.port }}
      targetPort: http
