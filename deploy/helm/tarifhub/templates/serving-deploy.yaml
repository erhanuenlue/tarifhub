apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-serving
  labels:
    app.kubernetes.io/name: tarifhub
    app.kubernetes.io/component: serving
spec:
  replicas: {{ .Values.serving.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tarifhub
      app.kubernetes.io/component: serving
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tarifhub
        app.kubernetes.io/component: serving
    spec:
      containers:
        - name: serving
          image: "{{ .Values.serving.image.repository }}:{{ .Values.serving.image.tag }}"
          imagePullPolicy: {{ .Values.serving.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.serving.port }}
          env:
            # 12-factor DB URL. The password is never inlined: it is pulled from the
            # db Secret into TARIFHUB_DB_PASSWORD and the URL is composed with
            # Kubernetes $(VAR) env-substitution, so no plaintext secret is rendered.
            - name: TARIFHUB_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-db
                  key: password
            - name: TARIFHUB_DB_URL
              value: "postgresql://{{ .Values.postgres.username }}:$(TARIFHUB_DB_PASSWORD)@{{ .Release.Name }}-postgres:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.serving.resources | nindent 12 }}
