apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-serving
  labels:
    app.kubernetes.io/name: tarifhub
    app.kubernetes.io/component: serving
spec:
  replicas: {{ .Values.serving.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: tarifhub
      app.kubernetes.io/component: serving
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tarifhub
        app.kubernetes.io/component: serving
    spec:
      containers:
        - name: serving
          image: "{{ .Values.serving.image.repository }}:{{ .Values.serving.image.tag }}"
          imagePullPolicy: {{ .Values.serving.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.serving.port }}
          env:
            # Single env-only DB URL (12-factor). Username/password come from the
            # postgres values (override in production via an existing Secret); the
            # secret-wiring shape is preserved so a real deployment can swap the
            # inline value for valueFrom.secretKeyRef.
            - name: TARIFHUB_DB_URL
              value: "postgresql://{{ .Values.postgres.username }}:{{ .Values.postgres.password }}@{{ .Release.Name }}-postgres:{{ .Values.postgres.port }}/{{ .Values.postgres.database }}"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.serving.resources | nindent 12 }}
