{{- if .Values.postgres.enabled }}
# Postgres credentials. The password is sourced here (not inlined into deployment
# env or the DB URL) so manifests carry no plaintext secret. The dev default comes
# from values.yaml; in production override .Values.postgres.password, or point the
# deployments at an externally managed Secret of the same name + key.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db
  labels:
    app.kubernetes.io/name: tarifhub
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  password: {{ .Values.postgres.password | quote }}
{{- end }}
