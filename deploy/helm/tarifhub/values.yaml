# Default values for the tarifhub chart.
#
# The image repositories below name the intended registry (ghcr.io/tarifhub/*,
# ADR-010). CI builds every sub-system image locally (the `images` job) but the
# automated GHCR push is not yet wired: an install therefore imports locally
# built images (k3d image import) and points the chart at them with value
# overrides for repository and tag, as the k3d evidence run did.

nameOverride: ""
fullnameOverride: ""

# Ingestion has two distinct workloads sharing one image (ADR-009 addendum):
#   1. review   -> the long-running review/read API (Deployment + Service, below);
#   2. batch    -> the load->harmonise->freeze pipeline, run-to-completion (Job/CronJob).
# The image's default CMD serves the review API; the batch overrides it with the CLI.
ingestion:
  image:
    repository: ghcr.io/tarifhub/ingestion
    tag: latest
    pullPolicy: IfNotPresent
  # The long-running review API (ingestion-review-deploy.yaml).
  replicas: 1
  port: 8000
  env:
    TARIFHUB_REVIEW_THRESHOLD: "0.85"
    TARIFHUB_EMBEDDINGS: "stub"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  # The run-to-completion batch pipeline (ingestion-batch-job.yaml).
  batch:
    enabled: true
    # Empty schedule => a one-shot Job (the honest default: BAG releases are irregular).
    # Set a cron expression (e.g. "0 3 * * 1") to render a CronJob instead.
    schedule: ""
    restartPolicy: Never
    backoffLimit: 1
    # The bundled sample source the batch ingests, and its tariff system (selects the parser).
    system: EAL
    path: /app/sample-data/input/eal_sample.xlsx

serving:
  image:
    repository: ghcr.io/tarifhub/serving
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8000
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

# TarifGuard — practice-facing Next.js front end. Read-only over the serving API.
tarifguard:
  enabled: true
  image:
    repository: ghcr.io/tarifhub/tarifguard
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 3000
  # Server-side only; never exposed to the browser. Points at the in-cluster serving Service.
  servingBaseUrl: ""
  # Server-side only. The review form proxies to the ingestion review endpoint here;
  # empty defaults to the in-cluster ingestion Service.
  ingestBaseUrl: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

# MCP server — read-only tools over the serving API for AI agents.
mcp:
  enabled: true
  image:
    repository: ghcr.io/tarifhub/mcp
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 8090
  transport: streamable-http
  servingBaseUrl: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "500m"
      memory: 256Mi

# TarifIQ — L2 intelligence service. Deterministic combinability/cross-walk/validation
# over frozen rule tables; reads frozen tariff facts from the L1 serving API.
intelligence:
  enabled: true
  image:
    repository: ghcr.io/tarifhub/intelligence
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8070
  # In-cluster it reads LIVE frozen records from serving (offline=0).
  offline: "0"
  servingBaseUrl: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

# KassenFlow — L3 app (payer correspondence / Kostengutsprache). Stub, opt-in.
kassenflow:
  enabled: false
  image:
    repository: ghcr.io/tarifhub/kassenflow
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3001
  servingBaseUrl: ""
  tarifiqBaseUrl: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

# MeldePilot — L3 app (mandatory reporting / quality data). Stub, opt-in.
meldepilot:
  enabled: false
  image:
    repository: ghcr.io/tarifhub/meldepilot
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  port: 3002
  servingBaseUrl: ""
  tarifiqBaseUrl: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "500m"
      memory: 512Mi

postgres:
  enabled: true
  image: pgvector/pgvector:pg16
  port: 5432
  database: tarifhub
  username: tarifhub
  # Dev/demo default only. Production MUST override this: set .Values.postgres.password,
  # or point the deployments at an externally managed Secret of the same name and key.
  password: changeme-in-production
  storage: 5Gi

ingress:
  enabled: true
  className: nginx
  # Platform API surface (serving /api, ingestion /ingest, mcp /mcp).
  host: tarifhub.local
  # L2 TarifIQ gets its own host (routes under /), so its /v1/* paths do not collide
  # with the serving /api surface on the platform host.
  intelligenceHost: tarifiq.local
  # The L3 apps each get their own host so their same-origin /api/* route handlers
  # (where present) do not collide with the serving /api path above.
  appHost: tarifguard.local
  kassenflowHost: kassenflow.local
  meldepilotHost: meldepilot.local
  tls:
    enabled: false
    secretName: tarifhub-tls
