<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 56" fill="none" role="img" aria-label="tarifhub" style="color:#0C4A6E">
  <!-- TarifHub - Monochrome Convergence Wordmark -->
  <!-- Single ink via currentColor. Default navy; set `color` to recolor (e.g. #FFFFFF on dark, #000 for print). -->

  <!-- Data streams -->
  <path d="M4 10 C24 10 34 23 50 28" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M4 28 L50 28" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M4 46 C24 46 34 33 50 28" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Origin dots -->
  <circle cx="4" cy="10" r="2.2" fill="currentColor"/>
  <circle cx="4" cy="28" r="2.2" fill="currentColor"/>
  <circle cx="4" cy="46" r="2.2" fill="currentColor"/>

  <!-- Hub node -->
  <rect x="50" y="22.5" width="11" height="11" rx="3" fill="currentColor"/>

  <!-- Output -->
  <line x1="61" y1="28" x2="72" y2="28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <circle cx="67" cy="28" r="1.6" fill="currentColor"/>

  <!-- Wordmark: weight contrast (300 / 700) preserves the tarif|hub split in one ink -->
  <text font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="30" x="80" y="37" letter-spacing="0.3" fill="currentColor">
    <tspan font-weight="300">tarif</tspan><tspan font-weight="700">hub</tspan>
  </text>
</svg>
