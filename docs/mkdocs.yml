# TarifHub - architecture documentation site (MkDocs Material)
# Serve:  mkdocs serve -f docs/mkdocs.yml
# Build:  mkdocs build -f docs/mkdocs.yml --strict

site_name: TarifHub
site_description: AI-assisted harmonisation above a deterministic freeze line. FFHS CAS AI-Assisted Software Engineering.
site_author: Erhan Ünlü
docs_dir: .
site_dir: ../site
# cas/ is the course-internal rubric working copy (gitignored); cockpit/ is the
# post-submission design package (ADR-022). Neither is rendered into the site.
exclude_docs: |
  cas/
  cockpit/
repo_url: https://github.com/erhanuenlue/tarifhub
repo_name: erhanuenlue/tarifhub
edit_uri: ""

theme:
  name: material
  logo: brand/assets/logo-mono.svg
  favicon: brand/assets/logo-primary.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/brand.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Summary: zusammenfassung-de.md
  - Architecture:
      - 1 · Introduction & Goals: arc42/01-introduction-goals.md
      - 2 · Constraints: arc42/02-constraints.md
      - 3 · Context & Scope: arc42/03-context-scope.md
      - 4 · Solution Strategy: arc42/04-solution-strategy.md
      - 5 · Building Blocks: arc42/05-building-block-view.md
      - 6 · Runtime View: arc42/06-runtime-view.md
      - 7 · Deployment View: arc42/07-deployment-view.md
      - 8 · Crosscutting Concepts: arc42/08-crosscutting-concepts.md
      - 9 · Architecture Decisions: arc42/09-architecture-decisions.md
      - 10 · Quality Requirements: arc42/10-quality-requirements.md
      - 11 · Risks & Technical Debt: arc42/11-risks-technical-debt.md
      - 12 · Glossary: arc42/12-glossary.md
      - 13 · Test Strategy: arc42/13-test-strategy.md
  - Architecture Decisions:
      - "ADR-001 · Python-first core; Next.js only at L3": adr/001-python-first-core.md
      - "ADR-002 · Service decomposition along the freeze line": adr/002-freeze-line-decomposition.md
      - "ADR-003 · Canonical, versioned, immutable record model": adr/003-canonical-record-model.md
      - "ADR-004 · Freeze, content-hash and lineage as the determinism anchor": adr/004-freeze-content-hash-lineage.md
      - "ADR-005 · Single AI seam (ai_map) with human-in-the-loop": adr/005-single-ai-seam.md
      - "ADR-006 · PostgreSQL 16 + pgvector as the single store": adr/006-postgres-pgvector.md
      - "ADR-007 · S3-compatible object store for raw source artifacts": adr/007-object-store-raw-artifacts.md
      - "ADR-008 · API styles: REST primary, plus GraphQL, FHIR R4, XML and MCP": adr/008-api-styles.md
      - "ADR-009 · Docker images + Kubernetes via Helm; compose for local": adr/009-docker-kubernetes-helm.md
      - "ADR-010 · GitHub Actions CI/CD with DevSecOps gates": adr/010-github-actions-devsecops.md
      - "ADR-011 · OpenTelemetry-based observability": adr/011-opentelemetry-observability.md
      - "ADR-012 · Data residency in Switzerland; LLM region boundary for patient data": adr/012-data-residency-llm-region.md
      - "ADR-013 · TarifGuard console demo scope: master-detail, review form, explain panel": adr/013-demo-scope.md
      - "ADR-014 · arc42-light retained as the documentation framework": adr/014-arc42-light.md
      - "ADR-015 · BAG ePL Spezialitätenliste (FHIR R5) ingestion": adr/015-epl-sl-fhir-ingestion.md
      - "ADR-016 · Canonical Decimal scale contract (stored bytes == hashed bytes)": adr/016-decimal-scale-contract.md
      - "ADR-017 · Deterministic search fallback; record-grounded explain endpoint": adr/017-deterministic-search-fallback-explain.md
      - "ADR-018 · Orchestrator model lifecycle (Fable 5, then Opus 4.8)": adr/018-orchestrator-model-lifecycle.md
  - AI-Assisted Method:
      - The AI-SE Framework: method/ai-se-framework.md
      - AI Tools & Workflow: method/ai-tools.md
      - Decision Matrix: method/decision-matrix.md
      - Journal (excerpts): method/journal.md
      - Conclusion: method/fazit.md
  - Criterion Map: criterion-map.md

plugins:
  - search
  - print-site:
      add_to_navigation: false
      print_page_title: "Full document"
      add_cover_page: true
      cover_page_template: ""
      toc_title: "Contents"
      enumerate_headings: false
