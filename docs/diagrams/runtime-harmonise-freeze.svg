<line x1="514.0" y1="136" x2="514.0" y2="608" stroke="#cbd5e1" stroke-width="1.4"/>
<rect x="670.0" y="96" width="132" height="40" rx="6" fill="#475569"/>
<text x="736.0" y="113" font-size="10.5" font-weight="bold" fill="white" text-anchor="middle">Human</text>
<text x="736.0" y="128" font-size="10.5" font-weight="bold" fill="white" text-anchor="middle">reviewer</text>
<line x1="736.0" y1="136" x2="736.0" y2="608" stroke="#cbd5e1" stroke-width="1.4"/>
<rect x="892.0" y="96" width="132" height="40" rx="6" fill="#11365f"/>
