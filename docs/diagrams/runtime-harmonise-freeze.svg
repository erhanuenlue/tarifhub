<line x1="736.0" y1="388" x2="292.0" y2="388" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="514.0" y="382" font-size="10" fill="#1f2733" text-anchor="middle">approve / correct</text>
<line x1="292.0" y1="434" x2="958.0" y2="434" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="625.0" y="428" font-size="10" fill="#1f2733" text-anchor="middle">freeze(): SHA-256 over sorted content</text>
<line x1="958.0" y1="480" x2="1180.0" y2="480" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="1069.0" y="474" font-size="10" fill="#1f2733" text-anchor="middle">append lineage (source, parser, conf, reviewer)</text>
<rect x="60" y="552" width="1260" height="56" rx="8" fill="#e9f7f1" stroke="#86c8ad"/>
<text x="76" y="574" font-size="12" font-weight="bold" fill="#11365f">Serving path (separate, deterministic):</text>
<text x="76" y="594" font-size="11" fill="#1f2733">Vendor / agent → TarifCore (or TarifMCP) → reads frozen record from Postgres → returns it verbatim. No LLM import on this path — enforced by an AST boundary test in CI.</text>
</svg>