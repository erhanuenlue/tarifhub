<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 668" font-family="Helvetica, Arial, sans-serif">
<rect x="0" y="0" width="1240" height="668" fill="white"/>
<text x="70" y="40" font-size="20" font-weight="bold" fill="#11365f">Runtime view — harmonisation &amp; freeze (behaviour)</text>
<text x="70" y="62" font-size="12" fill="#64748b">The single AI seam is pre-freeze and never touches a billing value; frozen records are then served deterministically.</text>
<defs><marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#475569"/></marker></defs>
