<text x="958.0" y="128" font-size="10.5" font-weight="bold" fill="white" text-anchor="middle">(frozen store)</text>
<line x1="958.0" y1="136" x2="958.0" y2="608" stroke="#cbd5e1" stroke-width="1.4"/>
<rect x="1114.0" y="96" width="132" height="40" rx="6" fill="#475569"/>
<text x="1180.0" y="113" font-size="10.5" font-weight="bold" fill="white" text-anchor="middle">Audit log</text>
<line x1="1180.0" y1="136" x2="1180.0" y2="608" stroke="#cbd5e1" stroke-width="1.4"/>
<line x1="847.0" y1="142" x2="847.0" y2="608" stroke="#0f766e" stroke-width="2" stroke-dasharray="7,5"/>
<text x="841.0" y="602" font-size="11" font-weight="bold" fill="#0f766e" text-anchor="end">◀ AI allowed (pre-freeze)</text>
<text x="853.0" y="602" font-size="11" font-weight="bold" fill="#0f766e">deterministic, no AI ▶</text>
<line x1="70.0" y1="150" x2="292.0" y2="150" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
<text x="181.0" y="144" font-size="10" fill="#1f2733" text-anchor="middle">raw file (XLSX / FHIR R5)</text>
<line x1="292.0" y1="196" x2="514.0" y2="196" stroke="#b45309" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ah)"/>
<text x="403.0" y="190" font-size="10" fill="#1f2733" text-anchor="middle">propose mapping — non-billing fields only</text>
<line x1="514.0" y1="242" x2="292.0" y2="242" stroke="#b45309" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#ah)"/>
<text x="403.0" y="236" font-size="10" fill="#1f2733" text-anchor="middle">designation / category (temp=0, structured)</text>
