# TarifHub serving service configuration.

# --- HTTP ---
quarkus.http.port=8080
quarkus.http.root-path=/

# --- Datasource: PostgreSQL (system of record, shared with ingestion) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:tarifhub}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:tarifhub}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/tarifhub}

# Serving is READ-ONLY over frozen rows: never let Hibernate create or mutate schema.
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.schema-management.strategy=validate

# --- OpenAPI / Swagger UI ---
quarkus.smallrye-openapi.path=/q/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui

# --- Observability: Prometheus metrics + OpenTelemetry traces ---
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.traces.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}

# --- AI semantic search (langchain4j) — used ONLY by ch.tarifhub.serving.search ---
# The embedding model MUST match the vectors written by ingestion (multilingual-e5,
# 1024 dimensions) and the pgvector column dimension in db/schema.sql.
quarkus.langchain4j.pgvector.dimension=1024
# Anthropic (optional) powers natural-language explanation of ranked frozen records;
# it never computes a value. Empty key => explanation seam is disabled.
quarkus.langchain4j.anthropic.api-key=${QUARKUS_LANGCHAIN4J_ANTHROPIC_API_KEY:}
quarkus.langchain4j.anthropic.chat-model.model-name=claude-sonnet-4-5

# --- Test profile ---
# @QuarkusTest expects a reachable Postgres with the schema applied (docker-compose up db
# then scripts/init_db.sh), or Quarkus Dev Services with a pgvector-enabled image. The
# value-path tests assert status/shape and do not require seeded data.
%test.quarkus.hibernate-orm.schema-management.strategy=validate
