name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ingestion:
    name: ingestion (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test (offline)
        run: pytest -q

  serving:
    name: serving (quarkus)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/serving
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build & verify
        run: mvn -B verify

  tarifguard:
    name: tarifguard (next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/tarifguard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/tarifguard/package-lock.json
      # Requires a committed package-lock.json (run `npm install` once locally).
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      # `next build` is heavier; keep it as the local/release gate. Enable in CI by
      # flipping this step on once the build runner budget allows.
      - name: Build
        run: npm run build

  mcp:
    name: mcp (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/mcp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Test (offline)
        run: pytest -q

  intelligence:
    name: intelligence (python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/intelligence
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test (offline)
        run: pytest -q

  kassenflow:
    name: kassenflow (next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/kassenflow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/kassenflow/package-lock.json
      # Requires a committed package-lock.json (run `npm install` once locally).
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  meldepilot:
    name: meldepilot (next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/meldepilot
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/meldepilot/package-lock.json
      # Requires a committed package-lock.json (run `npm install` once locally).
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  security:
    name: devsecops gates
    runs-on: ubuntu-latest
    needs: [ingestion, serving, tarifguard, mcp, intelligence, kassenflow, meldepilot]
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
      - name: Filesystem & dependency scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          exit-code: "1"
      - name: SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

  images:
    name: build & push images
    runs-on: ubuntu-latest
    needs: [security]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push ingestion
        uses: docker/build-push-action@v6
        with:
          context: services/ingestion
          push: true
          tags: ghcr.io/${{ github.repository }}/ingestion:${{ github.sha }}
      - name: Build & push serving
        uses: docker/build-push-action@v6
        with:
          context: services/serving
          push: true
          tags: ghcr.io/${{ github.repository }}/serving:${{ github.sha }}
      - name: Build & push tarifguard
        uses: docker/build-push-action@v6
        with:
          context: apps/tarifguard
          push: true
          tags: ghcr.io/${{ github.repository }}/tarifguard:${{ github.sha }}
      - name: Build & push mcp
        uses: docker/build-push-action@v6
        with:
          context: services/mcp
          push: true
          tags: ghcr.io/${{ github.repository }}/mcp:${{ github.sha }}
      - name: Build & push intelligence
        uses: docker/build-push-action@v6
        with:
          context: services/intelligence
          push: true
          tags: ghcr.io/${{ github.repository }}/intelligence:${{ github.sha }}
      - name: Build & push kassenflow
        uses: docker/build-push-action@v6
        with:
          context: apps/kassenflow
          push: true
          tags: ghcr.io/${{ github.repository }}/kassenflow:${{ github.sha }}
      - name: Build & push meldepilot
        uses: docker/build-push-action@v6
        with:
          context: apps/meldepilot
          push: true
          tags: ghcr.io/${{ github.repository }}/meldepilot:${{ github.sha }}
      # Deploy step (Helm) runs from a protected environment; left as a stub here.
      # - name: helm upgrade --install tarifhub deploy/helm/tarifhub
