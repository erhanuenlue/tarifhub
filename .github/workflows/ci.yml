# Reference CI for the Python-first monorepo (Option A: replace the existing repo's ci.yml with this).
# Lean by design: lint+test per service, security gates, docs build. Images on main only.
name: ci
on:
  push: { branches: [main] }
  pull_request:

# Prove Node-24 compatibility on our schedule: GitHub force-switches JavaScript
# actions to Node 24 on 2026-06-16 (mid-project). Remove after the switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python:
    runs-on: ubuntu-latest
    env:
      # Owner decision 2026-06-11: lockfiles are committed; CI never re-resolves.
      UV_FROZEN: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0 # exact tag: astral-sh has no floating v8 alias yet
      - name: Lint + test (offline suite — SQLite mirror, stub embedder)
        run: |
          for svc in services/*/; do
            if [ -f "$svc/pyproject.toml" ]; then
              echo "=== $svc ==="
              # uvx: ruff is not a base dependency of every service; plain `uv sync`
              # would not install it and the job would die before the tests run.
              # --extra dev where the service declares one: test-only deps (pytest for
              # the mcp thin proxy, pytest-cov, the mcp integration harness) live there.
              extra=""
              grep -q '^dev = \[' "$svc/pyproject.toml" && extra="--extra dev"
              (cd "$svc" && uv sync --quiet --frozen $extra && uvx ruff check . && uv run --no-sync pytest -q)
            fi
          done
      - name: Determinism boundary tests (must be visible in this log)
        run: |
          (cd services/ingestion && uv run pytest -q tests/test_determinism_boundary.py -v)
          (cd services/serving && uv run pytest -q tests/test_serving_boundary.py -v)
      - name: Coverage — core modules (report-only evidence, arc42 §10 target >80%)
        run: |
          (cd services/ingestion && uv run --extra dev pytest -q --cov=tarifhub_ingest --cov-report=term | tail -40)
          (cd services/serving && uv run --extra dev pytest -q --cov=tarifhub_serving --cov-report=term | tail -15)
          (cd services/mcp && uv run --extra dev pytest -q --cov=server --cov=config --cov-report=term | tail -10)

  # Cross-engine read parity: the SAME read tests run against a real Postgres 16 +
  # pgvector so SQLite-vs-Postgres drift (Block-0: json.loads on a JSONB dict; int for a
  # BOOLEAN column) cannot pass silently. Separate, parallel job so the offline `python`
  # job above stays fast and container-free.
  python-parity:
    runs-on: ubuntu-latest
    env:
      UV_FROZEN: "1"
      # The fixtures connect to this server only to CREATE a uniquely-named scratch
      # database per run (db/schema.sql applied, dropped on teardown). The `tarifhub`
      # database named here is the connection target for those admin statements; the
      # scratch DBs are what tests read/write — the named DB itself is never mutated.
      TARIFHUB_PG_TEST_URL: "postgresql://tarifhub:tarifhub@localhost:5432/tarifhub"
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: tarifhub
          POSTGRES_PASSWORD: tarifhub
          POSTGRES_DB: tarifhub
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tarifhub -d tarifhub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0 # exact tag: astral-sh has no floating v8 alias yet
      - name: Read parity (ingestion + serving) against Postgres 16 + pgvector
        run: |
          for svc in services/ingestion services/serving; do
            echo "=== $svc (parity) ==="
            (cd "$svc" && uv sync --quiet --frozen && uv run pytest -q tests/test_read_parity.py)
          done

  console:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: 22 }
      - name: Lint + build + test (when the console exists)
        run: |
          if [ -f apps/tarifguard/package.json ]; then
            # test runs --if-present: the Playwright smoke lands with the console build block
            cd apps/tarifguard && npm ci && npm run lint && npm run build && npm run test --if-present
          else
            echo "console not yet scaffolded — skipping"
          fi

  security:
    runs-on: ubuntu-latest
    permissions:
      # gitleaks-action lists PR commits via the API; the default restricted
      # token 403s ("Resource not accessible by integration") without this.
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with: { fetch-depth: 0 }
      - name: gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v3
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
      - name: Trivy (vulns, misconfig — fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@master
        with: { scan-type: fs, severity: "HIGH,CRITICAL", exit-code: "1" }
      - name: Syft SBOM (artifact per run)
        uses: anchore/sbom-action@v0
        with: { format: spdx-json, output-file: sbom.spdx.json }
      - uses: actions/upload-artifact@v7
        with: { name: sbom, path: sbom.spdx.json }

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: pip install mkdocs-material mkdocs-print-site-plugin
      - run: mkdocs build -f docs/mkdocs.yml --strict

  images:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [python, security]
    steps:
      - uses: actions/checkout@v6
      - name: Build every sub-system image (criterion 17 evidence)
        run: |
          for df in services/*/Dockerfile apps/*/Dockerfile; do
            [ -f "$df" ] || continue
            # serving vendors the ../ingestion path dependency -> needs repo-root context
            ctx="$(dirname $df)"; [ "$df" = "services/serving/Dockerfile" ] && ctx=.
            docker build -f "$df" -t "tarifhub-$(basename $(dirname $df)):ci" "$ctx"
          done
