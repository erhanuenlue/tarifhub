# Publish the architecture documentation to GitHub Pages on every docs change.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
name: docs
on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/docs.yml"]
  workflow_dispatch:

# Prove Node-24 compatibility on our schedule: GitHub force-switches JavaScript
# actions to Node 24 on 2026-06-16 (mid-project). Remove after the switch.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      # mkdocs 2.x rejects this config's docs_dir layout: pin the majors the site is built against
      - run: pip install "mkdocs<2" "mkdocs-material>=9,<10" "mkdocs-enumerate-headings-plugin<1"
      - run: mkdocs build -f docs/mkdocs.yml --strict
      - uses: actions/upload-pages-artifact@v3
        with: { path: site }

  deploy:
    # Block 3 go-live, in order: (1) flip repo public, (2) Settings → Environments →
    # github-pages → allow branch `main`, (3) Settings → Secrets and variables →
    # Actions → Variables → DEPLOY_PAGES=true. Until then this job skips cleanly.
    if: vars.DEPLOY_PAGES == 'true'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
